name: Bug 报告
description: 报告可复现的问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 简要说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. 打开 ...
        2. 点击 ...
        3. 看到 ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 报错日志或截图
      description: 可粘贴浏览器控制台、后端日志或截图。
  - type: input
    id: version
    attributes:
      label: 版本或提交
      placeholder: v0.1.0 / commit hash
  - type: dropdown
    id: deploy
    attributes:
      label: 部署方式
      options:
        - 本地非 Docker
        - Docker Compose
        - 1Panel
        - 其他
