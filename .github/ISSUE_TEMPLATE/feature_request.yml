name: 功能建议
description: 提出新功能或优化建议
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: scenario
    attributes:
      label: 使用场景
      description: 你希望在哪个流程里解决什么问题？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 可以描述交互、接口、配置或类似产品参考。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 如果已有临时解决办法，也可以写在这里。
